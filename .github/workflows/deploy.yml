name: Deploy Spec Site

on:
    push:
        branches: [ main ]

jobs:
    deploy:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Get version from package.json
              id: pkg
              run: echo "version=$(node -p "require('./package.json').version")" >>
                  $GITHUB_OUTPUT

            - name: Inject version into HTML
              run: |
                  sed -i 's/SPEC · v[0-9][0-9]*\.[0-9][0-9]*\.[0-9][0-9]*/SPEC · v${{ steps.pkg.outputs.version }}/g' docs/index.html
                  sed -i 's|<span>v[0-9][0-9]*\.[0-9][0-9]*\.[0-9][0-9]*</span>|<span>v${{ steps.pkg.outputs.version }}</span>|g' docs/index.html

            - name: Deploy to GitHub Pages
              uses: peaceiris/actions-gh-pages@v4
              with:
                  github_token: ${{ secrets.GITHUB_TOKEN }}
                  publish_dir: ./docs
